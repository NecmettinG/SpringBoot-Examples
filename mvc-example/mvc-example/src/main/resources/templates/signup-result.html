<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>sign-up result</title>
</head>
<body>
    <!--
        LECTURE NOTES:
        Because our controller used @ModelAttribute, the populated User object is automatically
        passed to this view under the name 'user' (the lowercase name of the class).
        We can then access its properties using Thymeleaf's variable expression: ${user.firstName}.
        Thymeleaf automatically calls the getter method (getFirstName()) behind the scenes.
    -->
    <h1>Signup Result</h1>
    <p th:text="'First name = ' + ${user.firstName}"/>
    <p th:text="'Last name = ' + ${user.lastName}"/>
    <p th:text="'Email = ' + ${user.email}"/>
</body>
</html>
