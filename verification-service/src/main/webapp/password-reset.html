<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>


    <script language="JavaScript">
        //This function will check if our token value is empty or not.
        function isEmpty(str) {
            return (!str || 0 === str.trim().length);
        }

        function saveNewPassword() {
            //We will read url query string and store it into urlParams variable.
            var urlParams = new URLSearchParams(location.search);

            //.has('token') function will check query string and look for "token" parameter. Returns boolean according to existence of parameter.
            //isEmpty implementation is on above.
            if (!urlParams.has('token') || isEmpty(urlParams.get('token'))) {
                alert("Missing the required Token");
                return;
            }

            //We will get token value and store it into tokenValue variable.
            var tokenValue = urlParams.get('token');

            //We will get passwords we entered to input fields.
            var password_one = document.getElementById("password_one").value;
            var password_two = document.getElementById("password_two").value;

            //the first input field cannot be empty.
            if (isEmpty(password_one)) {
                alert("Password cannot be empty");
                return;
            }

            //We will check if the first password input and the second one match.
            if (password_one !== password_two) {
                alert("Passwords do not match");
                return;
            }


            //We will send json payload to our API and we set payload type as json.
            $.ajaxSetup({
                "contentType": "application/json"
            });

            //Our json payload is initialized here.
            var dataPayload = {"token": tokenValue, "password": password_one};

            $.post('http://localhost:8080/mobile-app-ws/users/password-reset', JSON.stringify(dataPayload))
                //response is the response that comes from our API.
                .done(function (response) {
                    //We will clear the input fields first!
                    document.getElementById("password_one").value = "";
                    document.getElementById("password_two").value = "";

                    //If we return "SUCCESS" value in operationResult key field, We will show the div element with successful-result.
                    if (response["operationResult"] === "SUCCESS") {
                        //These are jquery implementation btw!
                        $("#not-successful-result").attr("style", "display: none !important;");
                        $("#successful-result").attr("style", "display: block !important;");

                    } else {
                        $("#successful-result").attr("style", "display: none !important;");
                        $("#not-successful-result").attr("style", "display: block !important;");
                    }

                });
        }

    </script>
</head>
<body>

<div id="successful-result" style="display:none">Your password is now updated</div>
<div id="not-successful-result" style="display:none">Could not update password</div>

<!--type="password" means input characters will be censored in input box.-->
<form>
    New password: <input type="password" id="password_one"/><br/>
    Retype new password: <input type="password" id="password_two"/><br/>
    <input type="button" value="Save new password" onclick="javascript:saveNewPassword()"/>
</form>

</body>
</html>
